version: '3.8'

services:
  triton-server:
    image: nvcr.io/nvidia/tritonserver:24.02-py3
    container_name: phone-detection-triton
    
    # GPU support (comment out if using CPU only)
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    
    ports:
      - "8000:8000"    # HTTP endpoint
      - "8001:8001"    # gRPC endpoint  
      - "8002:8002"    # Metrics endpoint
    
    volumes:
      - ./model_repository:/models:ro
      - ./logs:/logs
    
    command: tritonserver 
      --model-repository=/models 
      --allow-http=true
      --allow-grpc=true
      --allow-metrics=true 
      --http-port=8000
      --grpc-port=8001
      --metrics-port=8002
      --log-verbose=1
      --exit-on-error=false
      --strict-model-config=false
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    restart: unless-stopped
    
    # Resource limits (adjust based on your hardware)
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  # Optional: Triton client container for testing
  triton-client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: phone-detection-client
    
    volumes:
      - ./:/workspace
      - ./test_images:/test_images:ro
    
    depends_on:
      triton-server:
        condition: service_healthy
    
    command: tail -f /dev/null  # Keep container running for interactive testing
    
    profiles:
      - client  # Only start with --profile client

networks:
  default:
    name: phone-detection-network